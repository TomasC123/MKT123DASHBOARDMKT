<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MKT Panel de Control</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:#0f0e0c;font-family:'Geist Mono',monospace;height:100vh;display:flex;flex-direction:column;overflow:hidden}
.topbar{display:flex;align-items:center;gap:0;padding:0;background:#0f0e0c;border-bottom:1px solid rgba(255,255,255,.08);flex-shrink:0}
.logo{padding:16px 28px;border-right:1px solid rgba(255,255,255,.08)}
.logo-title{font-family:'Instrument Serif',Georgia,serif;font-size:18px;font-style:italic;color:#f7f5f0;display:block;line-height:1}
.logo-sub{font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:rgba(247,245,240,.3)}
.tabs{display:flex;flex:1}
.tab{padding:0 28px;height:54px;display:flex;align-items:center;gap:8px;font-size:12px;color:rgba(247,245,240,.45);cursor:pointer;border:none;background:none;font-family:'Geist Mono',monospace;border-bottom:2px solid transparent;transition:all .15s;letter-spacing:.02em}
.tab:hover{color:rgba(247,245,240,.75)}
.tab.active{color:#f7f5f0;border-bottom-color:#f7f5f0;font-weight:500}
.tab-icon{font-size:14px}
.frame-wrap{flex:1;position:relative}
iframe{position:absolute;inset:0;width:100%;height:100%;border:none;display:none}
iframe.active{display:block}
</style>
</head>
<body>
<div class="topbar">
  <div class="logo">
    <span class="logo-title">MKT</span>
    <span class="logo-sub">Panel de Control</span>
  </div>
  <div class="tabs">
    <button class="tab active" onclick="switchTab('calendario')" id="tab-calendario">
      <span class="tab-icon">◫</span> Calendario
    </button>
    <button class="tab" onclick="switchTab('campanas')" id="tab-campanas">
      <span class="tab-icon">◈</span> Campañas
    </button>
  </div>
</div>
<div class="frame-wrap">
  <iframe id="frame-calendario" class="active" src="calendario.html"></iframe>
  <iframe id="frame-campanas" src="campanas.html"></iframe>
</div>
<script>
function switchTab(name){
  document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('active');});
  document.querySelectorAll('iframe').forEach(function(f){f.classList.remove('active');});
  document.getElementById('tab-'+name).classList.add('active');
  document.getElementById('frame-'+name).classList.add('active');
}
</script>
</body>
</html>
