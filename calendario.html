<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calendario de Contenidos</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,600;1,9..144,300&display=swap" rel="stylesheet">
<style>
:root{--bg:#f5f3ee;--surface:#fff;--surface2:#f0ede6;--border:#d9d4c9;--border-light:#e8e4db;--text:#1a1714;--text-muted:#7a746a;--text-faint:#b0a99e;--radius:6px;--radius-lg:10px;--mono:'DM Mono',monospace;--serif:'Fraunces',Georgia,serif}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--mono);font-size:13px;min-height:100vh}
.shell{display:flex;min-height:100vh}
.sidebar{width:270px;min-width:270px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow-y:auto}
.main{flex:1;padding:28px 32px;overflow-x:auto;min-width:0}
.sidebar-header{padding:24px 20px 16px;border-bottom:1px solid var(--border-light)}
.sidebar-logo{font-family:var(--serif);font-size:18px;font-weight:600;color:var(--text);display:block;margin-bottom:2px;letter-spacing:-.3px}
.sidebar-sub{font-size:10px;color:var(--text-faint);letter-spacing:.08em;text-transform:uppercase}
.nav{padding:12px 10px;flex:1}
.nav-item{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:var(--radius);cursor:pointer;color:var(--text-muted);font-size:12px;transition:all .15s;border:none;background:none;width:100%;text-align:left}
.nav-item:hover{background:var(--surface2);color:var(--text)}
.nav-item.active{background:var(--text);color:var(--bg)}
.nav-icon{font-size:14px;width:18px;text-align:center}
.sidebar-section{padding:14px 20px;border-top:1px solid var(--border-light)}
.sidebar-label{font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--text-faint);margin-bottom:10px;display:block}
.period-row{display:flex;gap:6px;margin-bottom:8px;align-items:center}
select,input[type=text],input[type=number]{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font-family:var(--mono);font-size:12px;padding:6px 8px;outline:none;transition:border .15s;-webkit-appearance:none}
select:focus,input:focus{border-color:var(--text)}
select{cursor:pointer}
input[type=color]{width:30px;height:28px;padding:2px;border:1px solid var(--border);border-radius:var(--radius);cursor:pointer;background:var(--surface2)}
.camp-chip{display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:var(--radius);margin-bottom:4px;background:var(--surface2);border:1px solid var(--border-light)}
.camp-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.camp-name{flex:1;font-size:11px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.camp-budget{font-size:10px;color:var(--text-muted);white-space:nowrap}
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 12px;border-radius:var(--radius);border:1px solid var(--border);background:var(--surface);color:var(--text);font-family:var(--mono);font-size:11px;cursor:pointer;transition:all .15s;white-space:nowrap}
.btn:hover{background:var(--surface2);border-color:var(--text-muted)}
.btn-dark{background:var(--text);color:var(--bg);border-color:var(--text)}
.btn-dark:hover{opacity:.85}
.btn-sm{padding:4px 9px;font-size:10px}
.btn-icon{padding:5px 7px}
.btn-danger{color:#c0392b;border-color:#e8b8b3}
.btn-danger:hover{background:#fdf0ef}
.btn-green{background:#1a6740;color:#fff;border-color:#1a6740}
.btn-green:hover{opacity:.88}
.inline-form{display:flex;gap:6px;flex-wrap:wrap;align-items:center;margin-top:8px}
.inline-form input[type=text]{flex:1;min-width:100px}
.main-header{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:24px;flex-wrap:wrap;gap:12px}
.page-title{font-family:var(--serif);font-size:28px;font-weight:300;letter-spacing:-.5px;color:var(--text);font-style:italic}
.header-actions{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:24px}
.stat-card{background:var(--surface);border:1px solid var(--border-light);border-radius:var(--radius-lg);padding:14px 16px}
.stat-card-label{font-size:9px;text-transform:uppercase;letter-spacing:.1em;color:var(--text-faint);margin-bottom:6px}
.stat-card-val{font-family:var(--serif);font-size:26px;font-weight:600;color:var(--text);letter-spacing:-.5px;line-height:1}
.stat-card-sub{font-size:10px;color:var(--text-muted);margin-top:3px}
.cal-scroll{overflow-x:auto;border-radius:var(--radius-lg);border:1px solid var(--border);background:var(--surface)}
.cal-table{border-collapse:collapse;width:100%;min-width:600px}
.cal-table thead th{background:var(--surface2);padding:10px;text-align:left;font-size:10px;letter-spacing:.07em;text-transform:uppercase;color:var(--text-muted);border-bottom:1px solid var(--border);white-space:nowrap;font-weight:500;position:sticky;top:0;z-index:2}
.cal-table thead th:first-child{width:36px;position:sticky;left:0;z-index:3;background:var(--surface2)}
.cal-table thead th:nth-child(2){width:80px;position:sticky;left:36px;z-index:3;background:var(--surface2)}
.cal-table td{border-bottom:1px solid var(--border-light);padding:4px 6px;vertical-align:middle}
.cal-table td.wk-col{font-size:9px;color:var(--text-faint);text-align:center;width:36px;background:var(--surface2);position:sticky;left:0;z-index:1;letter-spacing:.05em;border-right:1px solid var(--border-light)}
.cal-table td.day-col{background:var(--surface2);position:sticky;left:36px;z-index:1;border-right:1px solid var(--border);width:80px;padding:5px 10px}
.day-num{font-family:var(--serif);font-size:18px;font-weight:600;line-height:1;color:var(--text)}
.day-name{font-size:9px;color:var(--text-faint);text-transform:uppercase;letter-spacing:.07em}
tr.weekend td{background:#faf8f4}
tr.weekend td.wk-col,tr.weekend td.day-col{background:#f2efe8}
.cal-table td.prod-cell{min-width:90px;cursor:pointer;padding:4px 6px}
.cell-pill{display:block;border-radius:4px;padding:3px 7px;font-size:10px;font-weight:500;text-align:center;line-height:1.4;cursor:pointer;transition:opacity .1s;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cell-pill:hover{opacity:.8}
.cell-empty{display:block;min-height:22px;border-radius:4px;border:1px dashed transparent;transition:border-color .15s}
td.prod-cell:hover .cell-empty{border-color:var(--border)}
td.prod-cell.selected .cell-empty{background:rgba(90,61,184,.08);border:1px dashed rgba(90,61,184,.4)}
td.prod-cell.selected .cell-pill{outline:2px solid rgba(90,61,184,.5);outline-offset:1px}
.budget-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
.bcard{background:var(--surface);border:1px solid var(--border-light);border-radius:var(--radius-lg);overflow:hidden}
.bcard-header{padding:12px 16px;border-bottom:1px solid var(--border-light);font-size:9px;text-transform:uppercase;letter-spacing:.1em;color:var(--text-faint);background:var(--surface2)}
.btable{width:100%;border-collapse:collapse;font-size:12px}
.btable th{padding:8px 12px;text-align:right;font-size:10px;color:var(--text-muted);font-weight:500;border-bottom:1px solid var(--border-light)}
.btable th:first-child{text-align:left}
.btable td{padding:8px 12px;border-bottom:1px solid var(--border-light);text-align:right}
.btable td:first-child{text-align:left}
.btable tr:last-child td{border-bottom:none}
.btable tr.total td{font-weight:500;background:var(--surface2);font-family:var(--serif);font-size:13px}
.heatmap{display:flex;flex-wrap:wrap;gap:3px;padding:14px 16px}
.hm-cell{width:28px;height:28px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:500;position:relative;cursor:default;transition:transform .1s}
.hm-cell:hover{transform:scale(1.15);z-index:1}
.hm-tooltip{position:absolute;bottom:34px;left:50%;transform:translateX(-50%);background:var(--text);color:var(--bg);font-size:10px;padding:3px 7px;border-radius:4px;white-space:nowrap;pointer-events:none;opacity:0;transition:opacity .15s;z-index:10}
.hm-cell:hover .hm-tooltip{opacity:1}
.legend{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:20px}
.legend-item{display:flex;align-items:center;gap:6px;padding:4px 10px;border-radius:20px;font-size:10px;border:1px solid}
.modal-overlay{position:fixed;inset:0;background:rgba(26,23,20,.4);backdrop-filter:blur(2px);display:none;align-items:center;justify-content:center;z-index:200}
.modal-overlay.open{display:flex}
.modal-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:22px 24px;min-width:280px;max-width:420px;width:90%;box-shadow:0 8px 40px rgba(0,0,0,.12);animation:modalIn .18s ease}
@keyframes modalIn{from{opacity:0;transform:translateY(6px) scale(.98)}to{opacity:1;transform:none}}
.modal-title{font-family:var(--serif);font-size:16px;font-weight:600;margin-bottom:2px}
.modal-sub{font-size:11px;color:var(--text-muted);margin-bottom:14px}
.modal-option{display:block;width:100%;text-align:left;padding:10px 14px;margin-bottom:6px;border-radius:var(--radius);border:1px solid;cursor:pointer;font-family:var(--mono);font-size:12px;transition:opacity .1s,transform .1s}
.modal-option:hover{opacity:.85;transform:translateX(2px)}
.modal-footer{display:flex;gap:8px;margin-top:8px;flex-wrap:wrap}
.cfg-section{background:var(--surface);border:1px solid var(--border-light);border-radius:var(--radius-lg);padding:18px 20px;margin-bottom:16px}
.cfg-title{font-size:9px;text-transform:uppercase;letter-spacing:.1em;color:var(--text-faint);margin-bottom:14px}
.cfg-row{display:flex;align-items:center;gap:10px;padding:6px 0;border-bottom:1px solid var(--border-light);flex-wrap:wrap}
.cfg-row:last-of-type{border-bottom:none}
.cfg-row-name{flex:1;font-size:12px;min-width:80px}
.cfg-row-area{font-size:10px;color:var(--text-muted);padding:2px 8px;background:var(--surface2);border-radius:10px;border:1px solid var(--border-light)}
.saved-item{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border-light)}
.saved-item:last-child{border-bottom:none}
.saved-name{font-size:13px;font-family:var(--serif);font-weight:600}
.saved-date{font-size:10px;color:var(--text-muted)}
.notice{background:var(--surface2);border:1px solid var(--border-light);border-radius:var(--radius);padding:8px 12px;font-size:11px;color:var(--text-muted);margin-bottom:16px}
.bulk-bar{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:14px 18px;margin-bottom:16px;display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.bulk-bar label{font-size:11px;color:var(--text-muted)}
.selected-count{font-size:11px;color:var(--text-muted);padding:4px 10px;background:var(--surface2);border-radius:12px;border:1px solid var(--border-light)}
.sync-bar{display:flex;align-items:center;gap:8px;padding:8px 20px;border-top:1px solid var(--border-light);font-size:10px;color:var(--text-faint);background:var(--surface);min-height:36px}
.sync-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.sync-dot.ok{background:#1a6740}
.sync-dot.saving{background:#b85a10;animation:pulse .8s infinite}
.sync-dot.error{background:#c0392b}
.sync-dot.offline{background:#b0a99e}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
/* Product selector */
.prod-selector{max-width:540px;margin:0 auto}
.prod-check-row{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:var(--radius);cursor:pointer;margin-bottom:5px;border:1px solid var(--border-light);background:var(--surface2);transition:border-color .15s}
.prod-check-row:hover{border-color:var(--border)}
.prod-check-row input[type=checkbox]{width:15px;height:15px;accent-color:var(--text);cursor:pointer;flex-shrink:0}
.area-divider{font-size:9px;text-transform:uppercase;letter-spacing:.1em;color:var(--text-faint);margin:14px 0 7px}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
</style>
</head>
<body>
<div class="shell">
  <aside class="sidebar">
    <div class="sidebar-header">
      <span class="sidebar-logo">Contenidos</span>
      <span class="sidebar-sub">Marketing Calendar</span>
    </div>
    <nav class="nav">
      <button class="nav-item active" onclick="showView('calendar')" id="nav-calendar"><span class="nav-icon">◫</span> Calendario</button>
      <button class="nav-item" onclick="showView('budget')" id="nav-budget"><span class="nav-icon">◈</span> Presupuesto</button>
      <button class="nav-item" onclick="showView('config')" id="nav-config"><span class="nav-icon">◎</span> Configuración</button>
      <button class="nav-item" onclick="showView('saved')" id="nav-saved"><span class="nav-icon">◉</span> Versiones</button>
    </nav>
    <div class="sidebar-section">
      <span class="sidebar-label">Período</span>
      <div class="period-row">
        <select id="sb-month" style="flex:1">
          <option value="0">Enero</option><option value="1">Febrero</option><option value="2">Marzo</option>
          <option value="3">Abril</option><option value="4">Mayo</option><option value="5">Junio</option>
          <option value="6">Julio</option><option value="7">Agosto</option><option value="8">Septiembre</option>
          <option value="9">Octubre</option><option value="10">Noviembre</option><option value="11">Diciembre</option>
        </select>
        <input type="number" id="sb-year" value="2026" min="2024" max="2030" style="width:64px">
      </div>
      <div class="period-row">
        <select id="sb-currency" style="width:72px"><option>USD</option><option>ARS</option><option>EUR</option></select>
        <label style="font-size:11px;color:var(--text-muted);white-space:nowrap">Días:</label>
        <input type="number" id="sb-days" value="31" min="1" max="31" style="width:52px">
        <button class="btn btn-dark" style="flex:1;justify-content:center" onclick="applyPeriod()">OK</button>
      </div>
    </div>
    <div class="sidebar-section">
      <span class="sidebar-label">Campañas</span>
      <div id="sb-save-status" style="margin-bottom:8px"></div>
      <div id="sb-camps"></div>
    </div>
    <div class="sync-bar" id="sync-bar">
      <span class="sync-dot offline" id="sync-dot"></span>
      <span id="sync-text">Iniciando...</span>
    </div>
  </aside>
  <main class="main" id="main-content"></main>
</div>

<!-- MODAL individual -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal-box">
    <div class="modal-title" id="modal-title"></div>
    <div class="modal-sub" id="modal-sub"></div>
    <div id="modal-options"></div>
    <div class="modal-footer">
      <button class="btn btn-danger btn-sm" onclick="clearModalCell()">Limpiar celda</button>
      <button class="btn btn-sm" style="margin-left:auto" onclick="closeModal()">Cancelar</button>
    </div>
  </div>
</div>

<!-- MODAL bulk -->
<div class="modal-overlay" id="bulk-modal-overlay">
  <div class="modal-box">
    <div class="modal-title">Asignación masiva</div>
    <div class="modal-sub" id="bulk-modal-sub"></div>
    <div id="bulk-modal-options"></div>
    <div class="modal-footer">
      <button class="btn btn-danger btn-sm" onclick="bulkClear()">Cancelar</button>
      <button class="btn btn-sm" style="margin-left:auto" onclick="closeBulkModal()">Cerrar</button>
    </div>
  </div>
</div>

<script>
const DAYS=['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
const MONTHS=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];

const API_KEY = '$2a$10$8zdRepF9eXqIWoAegLw22uCbihfDgvF2UO1kanxuRU8a.JZ2.uyDW';
const BIN_ID  = '69e68df036566621a8d3ca66';

let GLOBAL = {
  products:[
    {id:'p1',name:'Weed It',area:'AGRO'},
    {id:'p2',name:'TopXGun',area:'AGRO'},
    {id:'p3',name:'Estacion Total',area:'Ingenieria'},
    {id:'p4',name:'USRadar',area:'Ingenieria'},
    {id:'p5',name:'Serv. Técnico',area:'Institucional'},
  ],
  campaigns:[
    {id:'c1',name:'Formulario',color:'#2a8c6e',budget:15},
    {id:'c2',name:'Interaccion',color:'#5a3db8',budget:12},
    {id:'c3',name:'Video',color:'#b85a10',budget:20},
    {id:'c4',name:'Awareness',color:'#1a6ba8',budget:10},
  ],
  calendars:{}
};

let _now=new Date();
let S = { month:_now.getMonth(), year:_now.getFullYear(), currency:'USD', customDays:null, activeProducts:null, cells:{} };
let currentView='calendar', activeModal=null, selectedCells=new Set(), bulkMode=false;

function calKey(m,y){ return y+'-'+m; }
function getDays(){ return S.customDays || new Date(S.year,S.month+1,0).getDate(); }
function cellKey(d,pid){ return S.year+'-'+S.month+'-'+d+'-'+pid; }
function selKey(d,pid){ return d+'|'+pid; }
function rgba(h,a){var r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);return 'rgba('+r+','+g+','+b+','+a+')';}
function rgbParts(h){var r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);return r+','+g+','+b;}
function activeProdList(){ if(!S.activeProducts||!S.activeProducts.length)return GLOBAL.products; return GLOBAL.products.filter(function(p){return S.activeProducts.indexOf(p.id)>=0;}); }

// SYNC
function setSyncStatus(status,text){
  var dot=document.getElementById('sync-dot'),txt=document.getElementById('sync-text');
  if(!dot||!txt)return;
  dot.className='sync-dot '+status; txt.textContent=text;
}

async function syncLoad(){
  setSyncStatus('saving','Cargando...');
  try{
    var r=await fetch('https://api.jsonbin.io/v3/b/'+BIN_ID+'/latest',{headers:{'X-Master-Key':API_KEY}});
    if(!r.ok)throw new Error('HTTP '+r.status);
    var data=await r.json();
    var remote=data.record;
    if(remote&&(remote.products||remote.calendars)){
      if(remote.products)GLOBAL.products=remote.products;
      if(remote.campaigns)GLOBAL.campaigns=remote.campaigns;
      if(remote.calendars)GLOBAL.calendars=remote.calendars;
      loadMonthIntoS(S.month,S.year);
      renderSidebar(); renderView();
    }
    setSyncStatus('ok','Sincronizado · '+new Date().toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit'}));
  }catch(e){
    setSyncStatus('error','Error al cargar');
    console.error(e);
  }
}

async function syncSave(){
  setSyncStatus('saving','Guardando...');
  var key=calKey(S.month,S.year);
  GLOBAL.calendars[key]={
    cells:S.cells,
    currency:S.currency,
    customDays:S.customDays,
    activeProducts:S.activeProducts,
    savedAt:new Date().toLocaleString('es-AR')
  };
  try{
    var r=await fetch('https://api.jsonbin.io/v3/b/'+BIN_ID,{
      method:'PUT',
      headers:{'Content-Type':'application/json','X-Master-Key':API_KEY},
      body:JSON.stringify(GLOBAL)
    });
    if(!r.ok)throw new Error('HTTP '+r.status);
    setSyncStatus('ok','Guardado · '+new Date().toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit'}));
    renderSidebar();
  }catch(e){
    setSyncStatus('error','Error al guardar');
    console.error(e);
  }
}

async function doSave(){
  var btns=document.querySelectorAll('.save-btn');
  btns.forEach(function(b){b.textContent='Guardando...';b.disabled=true;});
  await syncSave();
  btns.forEach(function(b){b.textContent='Guardado ✓';});
  setTimeout(function(){btns.forEach(function(b){b.textContent='Guardar';b.disabled=false;});},2000);
}

function loadMonthIntoS(month,year){
  var key=calKey(month,year);
  var saved=GLOBAL.calendars[key];
  S.month=month; S.year=year;
  S.cells=saved?JSON.parse(JSON.stringify(saved.cells||{})):{};
  S.currency=saved?saved.currency||'USD':'USD';
  S.customDays=saved?saved.customDays||null:null;
  S.activeProducts=saved&&saved.activeProducts?saved.activeProducts:null;
}

// SIDEBAR
function renderSidebar(){
  document.getElementById('sb-month').value=S.month;
  document.getElementById('sb-year').value=S.year;
  document.getElementById('sb-currency').value=S.currency;
  document.getElementById('sb-days').value=getDays();
  var key=calKey(S.month,S.year);
  var saved=GLOBAL.calendars[key];
  var el=document.getElementById('sb-save-status');
  if(el) el.innerHTML=saved
    ?'<span style="font-size:9px;color:#1a6740">✓ guardado</span>'
    :'<span style="font-size:9px;color:var(--text-faint)">sin guardar</span>';
  document.getElementById('sb-camps').innerHTML=GLOBAL.campaigns.map(function(c){
    return '<div class="camp-chip"><span class="camp-dot" style="background:'+c.color+'"></span>'
      +'<span class="camp-name">'+c.name+'</span>'
      +'<span class="camp-budget">'+S.currency+' '+c.budget+'</span></div>';
  }).join('');
}

function applyPeriod(){
  var m=parseInt(document.getElementById('sb-month').value);
  var y=parseInt(document.getElementById('sb-year').value);
  var cur=document.getElementById('sb-currency').value;
  var dv=parseInt(document.getElementById('sb-days').value);
  loadMonthIntoS(m,y);
  S.currency=cur;
  S.customDays=(dv&&dv!==new Date(y,m+1,0).getDate())?dv:null;
  selectedCells.clear();
  renderSidebar(); renderView();
}

// VIEWS
function showView(v){
  currentView=v;
  ['calendar','budget','config','saved'].forEach(function(id){
    document.getElementById('nav-'+id).classList.toggle('active',id===v);
  });
  renderView();
}
function renderView(){
  document.getElementById('main-content').innerHTML=
    currentView==='calendar'?buildCalendar():
    currentView==='budget'?buildBudget():
    currentView==='config'?buildConfig():
    buildSaved();
}

// PRODUCT SELECTOR
function buildProductSelector(){
  var areas=[...new Set(GLOBAL.products.map(function(p){return p.area;}))];
  var key=calKey(S.month,S.year);
  var isNew=!GLOBAL.calendars[key];
  var html='<div class="main-header"><h1 class="page-title">'+MONTHS[S.month]+' '+S.year+'</h1>'
    +(isNew
      ?'<span style="font-size:12px;color:var(--text-faint);font-style:italic">Calendario nuevo</span>'
      :'<span style="font-size:12px;color:#1a6740">✓ Calendario guardado</span>')
    +'</div>'
    +'<div class="prod-selector"><div class="cfg-section">'
    +'<div class="cfg-title">¿Qué productos mostrás este mes?</div>'
    +'<p style="font-size:12px;color:var(--text-muted);margin-bottom:18px;line-height:1.7">'
    +(isNew?'Este mes no tiene calendario guardado. Empezá desde cero.':'Elegí los productos a visualizar.')
    +'</p>';
  areas.forEach(function(area){
    html+='<div class="area-divider">'+area+'</div>';
    GLOBAL.products.filter(function(p){return p.area===area;}).forEach(function(p){
      html+='<label class="prod-check-row">'
        +'<input type="checkbox" id="ps-'+p.id+'" value="'+p.id+'" checked>'
        +'<span style="font-size:13px">'+p.name+'</span>'
        +'</label>';
    });
  });
  html+='<div style="display:flex;gap:10px;margin-top:18px;flex-wrap:wrap">'
    +'<button class="btn btn-dark" onclick="confirmProductSelection()">Ver calendario →</button>'
    +'<button class="btn btn-sm" onclick="psSelectAll()">Todos</button>'
    +'<button class="btn btn-sm" onclick="psSelectNone()">Ninguno</button>'
    +'</div></div></div>';
  return html;
}
function psSelectAll(){ GLOBAL.products.forEach(function(p){var cb=document.getElementById('ps-'+p.id);if(cb)cb.checked=true;}); }
function psSelectNone(){ GLOBAL.products.forEach(function(p){var cb=document.getElementById('ps-'+p.id);if(cb)cb.checked=false;}); }
function confirmProductSelection(){
  var checked=GLOBAL.products.filter(function(p){var cb=document.getElementById('ps-'+p.id);return cb&&cb.checked;}).map(function(p){return p.id;});
  if(!checked.length){alert('Seleccioná al menos un producto.');return;}
  S.activeProducts=checked; renderView();
}

// CALENDAR
function buildCalendar(){
  if(!S.activeProducts||!S.activeProducts.length) return buildProductSelector();
  var days=getDays(), stats=calcStats(), selCount=selectedCells.size;

  var html='<div class="main-header"><h1 class="page-title">'+MONTHS[S.month]+' '+S.year+'</h1>'
    +'<div class="header-actions">'
    +'<button class="btn" onclick="S.activeProducts=null;renderView()">⊙ Productos</button>'
    +'<button class="btn '+(bulkMode?'btn-dark':'')+'" onclick="toggleBulkMode()">'+(bulkMode?'✓ Masivo ON':'⊞ Masivo')+'</button>'
    +'<button class="btn btn-green" onclick="exportExcel()">↓ Excel</button>'
    +'<button class="btn btn-dark save-btn" onclick="doSave()">Guardar</button>'
    +'</div></div>';

  if(bulkMode){
    html+='<div class="bulk-bar">'
      +'<span class="selected-count">'+selCount+' celda'+(selCount!==1?'s':'')+' seleccionada'+(selCount!==1?'s':'')+'</span>'
      +'<label>Producto:</label>'
      +'<select style="padding:5px 8px;font-size:12px;height:30px" id="bulk-filter-prod" onchange="renderView()">'
      +'<option value="">Todos</option>'
      +activeProdList().map(function(p){return '<option value="'+p.id+'">'+p.name+'</option>';}).join('')
      +'</select>'
      +'<label>Días:</label>'
      +'<select style="padding:5px 8px;font-size:12px;height:30px" id="bulk-filter-day" onchange="renderView()">'
      +'<option value="">Todos</option><option value="weekday">Lun–Vie</option><option value="weekend">Fin de semana</option>'
      +'</select>'
      +(selCount>0?'<button class="btn btn-dark btn-sm" onclick="openBulkModal()">Asignar '+selCount+' →</button>':'')
      +(selCount>0?'<button class="btn btn-sm btn-danger" onclick="bulkClearDirect()">Limpiar</button>':'')
      +'<button class="btn btn-sm" onclick="selectAll()">Selec. todo</button>'
      +'<button class="btn btn-sm" onclick="deselectAll()">Deselec.</button>'
      +'</div>';
  }

  html+='<div class="stats-row">'
    +'<div class="stat-card"><div class="stat-card-label">Presupuesto estimado</div><div class="stat-card-val">'+stats.total.toLocaleString()+'</div><div class="stat-card-sub">'+S.currency+' · '+days+' días</div></div>'
    +'<div class="stat-card"><div class="stat-card-label">Activaciones</div><div class="stat-card-val">'+stats.acts+'</div><div class="stat-card-sub">en '+stats.activeDays+' días</div></div>'
    +'<div class="stat-card"><div class="stat-card-label">Promedio diario</div><div class="stat-card-val">'+Math.round(stats.total/days)+'</div><div class="stat-card-sub">'+S.currency+'/día</div></div>'
    +'<div class="stat-card"><div class="stat-card-label">Campaña líder</div><div class="stat-card-val" style="font-size:18px">'+(stats.topCamp||'—')+'</div><div class="stat-card-sub">'+stats.topCampDays+' días</div></div>'
    +'</div>';

  html+='<div class="legend">'+GLOBAL.campaigns.map(function(c){
    return '<span class="legend-item" style="background:'+rgba(c.color,.1)+';color:'+c.color+';border-color:'+rgba(c.color,.3)+'">'
      +'<span style="width:8px;height:8px;border-radius:50%;background:'+c.color+';display:inline-block"></span>'
      +c.name+' · '+S.currency+' '+c.budget+'/día</span>';
  }).join('')+'</div>';

  if(!bulkMode) html+='<div class="notice">Click para asignar · Click derecho para limpiar · Guardá cuando terminés</div>';

  var prods=activeProdList();
  html+='<div class="cal-scroll"><table class="cal-table"><thead><tr><th></th><th>Día</th>';
  prods.forEach(function(p){ html+='<th>'+p.name+'<br><span style="font-weight:400;opacity:.6;font-size:9px">'+p.area+'</span></th>'; });
  html+='</tr></thead><tbody>';

  var bpf=bulkMode?(document.getElementById('bulk-filter-prod')&&document.getElementById('bulk-filter-prod').value||''):'';
  var bdf=bulkMode?(document.getElementById('bulk-filter-day')&&document.getElementById('bulk-filter-day').value||''):'';
  var week=1;

  for(var d=1;d<=days;d++){
    var dow=new Date(S.year,S.month,d).getDay();
    var isWe=dow===0||dow===6;
    if(d>1&&dow===1)week++;
    var wkLabel=(d===1||dow===1)?'S'+week:'';
    html+='<tr class="'+(isWe?'weekend':'')+'"><td class="wk-col">'+wkLabel+'</td>'
      +'<td class="day-col"><div class="day-num">'+d+'</div><div class="day-name">'+DAYS[dow]+'</div></td>';
    prods.forEach(function(p){
      var k2=cellKey(d,p.id), sk=selKey(d,p.id);
      var cid=S.cells[k2], camp=GLOBAL.campaigns.find(function(c){return c.id===cid;});
      var isSel=selectedCells.has(sk);
      var dimmed=bulkMode&&((bpf&&p.id!==bpf)||(bdf==='weekday'&&isWe)||(bdf==='weekend'&&!isWe));
      // Use data attributes to avoid quoting issues in onclick
      html+='<td class="prod-cell'+(isSel?' selected':'')+'"'
        +' style="'+(dimmed?'opacity:.3':'')+'"'
        +' data-day="'+d+'" data-pid="'+p.id+'"'
        +' onclick="cellClick(event,this)" oncontextmenu="ctxClear(event,this)">';
      if(camp){
        html+='<span class="cell-pill" style="background:'+rgba(camp.color,.15)+';color:'+camp.color+';border:1px solid '+rgba(camp.color,.3)+'">'+camp.name+'</span>';
      }else{
        html+='<span class="cell-empty"></span>';
      }
      html+='</td>';
    });
    html+='</tr>';
  }
  html+='</tbody></table></div>';
  return html;
}

// BULK
function toggleBulkMode(){ bulkMode=!bulkMode; if(!bulkMode)selectedCells.clear(); renderView(); }
function cellClick(e,el){
  var day=parseInt(el.dataset.day), pid=el.dataset.pid;
  if(bulkMode){ var sk=selKey(day,pid); if(selectedCells.has(sk))selectedCells.delete(sk); else selectedCells.add(sk); renderView(); }
  else openModal(day,pid);
}
function selectAll(){
  var days=getDays();
  var bpf=document.getElementById('bulk-filter-prod')&&document.getElementById('bulk-filter-prod').value||'';
  var bdf=document.getElementById('bulk-filter-day')&&document.getElementById('bulk-filter-day').value||'';
  for(var d=1;d<=days;d++){
    var dow=new Date(S.year,S.month,d).getDay(), isWe=dow===0||dow===6;
    activeProdList().forEach(function(p){
      if(bpf&&p.id!==bpf)return;
      if(bdf==='weekday'&&isWe)return;
      if(bdf==='weekend'&&!isWe)return;
      selectedCells.add(selKey(d,p.id));
    });
  }
  renderView();
}
function deselectAll(){ selectedCells.clear(); renderView(); }
function openBulkModal(){
  if(!selectedCells.size)return;
  document.getElementById('bulk-modal-sub').textContent=selectedCells.size+' celdas seleccionadas';
  document.getElementById('bulk-modal-options').innerHTML=GLOBAL.campaigns.map(function(c){
    return '<button class="modal-option" onclick="bulkAssign(\''+c.id+'\')" style="background:'+rgba(c.color,.1)+';color:'+c.color+';border-color:'+rgba(c.color,.25)+'">'+c.name+' <span style="opacity:.6;font-size:10px;margin-left:6px">'+S.currency+' '+c.budget+'/día</span></button>';
  }).join('');
  document.getElementById('bulk-modal-overlay').classList.add('open');
}
function closeBulkModal(){ document.getElementById('bulk-modal-overlay').classList.remove('open'); }
function bulkAssign(cid){
  selectedCells.forEach(function(sk){var parts=sk.split('|');S.cells[cellKey(parseInt(parts[0]),parts[1])]=cid;});
  selectedCells.clear(); closeBulkModal(); renderView();
}
function bulkClear(){ closeBulkModal(); selectedCells.clear(); renderView(); }
function bulkClearDirect(){
  selectedCells.forEach(function(sk){var parts=sk.split('|');delete S.cells[cellKey(parseInt(parts[0]),parts[1])];});
  selectedCells.clear(); renderView();
}
function ctxClear(e,el){ e.preventDefault(); delete S.cells[cellKey(parseInt(el.dataset.day),el.dataset.pid)]; renderView(); }

// INDIVIDUAL MODAL
function openModal(day,pid){
  activeModal={day:day,pid:pid};
  var p=GLOBAL.products.find(function(x){return x.id===pid;});
  var dow=new Date(S.year,S.month,day).getDay();
  document.getElementById('modal-title').textContent=p.name;
  document.getElementById('modal-sub').textContent=DAYS[dow]+' '+day+' de '+MONTHS[S.month]+' '+S.year;
  var cur=S.cells[cellKey(day,pid)];
  document.getElementById('modal-options').innerHTML=GLOBAL.campaigns.map(function(c){
    var isA=cur===c.id;
    return '<button class="modal-option'+(isA?' active':'')+'" onclick="assignCell(\''+c.id+'\')" style="background:'+rgba(c.color,isA?.18:.08)+';color:'+c.color+';border-color:'+rgba(c.color,isA?.4:.2)+';font-weight:'+(isA?500:400)+'">'+(isA?'✓ ':'')+c.name+'<span style="opacity:.6;font-size:10px;margin-left:6px">'+S.currency+' '+c.budget+'/día</span></button>';
  }).join('');
  document.getElementById('modal-overlay').classList.add('open');
}
function closeModal(){ document.getElementById('modal-overlay').classList.remove('open'); activeModal=null; }
function assignCell(cid){ if(activeModal)S.cells[cellKey(activeModal.day,activeModal.pid)]=cid; closeModal(); renderView(); }
function clearModalCell(){ if(activeModal)delete S.cells[cellKey(activeModal.day,activeModal.pid)]; closeModal(); renderView(); }
document.getElementById('modal-overlay').onclick=function(e){ if(e.target===e.currentTarget)closeModal(); };
document.getElementById('bulk-modal-overlay').onclick=function(e){ if(e.target===e.currentTarget)closeBulkModal(); };

// SAVED CALENDARS
function buildSaved(){
  var cals=GLOBAL.calendars;
  var keys=Object.keys(cals).sort(function(a,b){
    var pa=a.split('-').map(Number), pb=b.split('-').map(Number);
    return pa[0]!==pb[0]?pb[0]-pa[0]:pb[1]-pa[1];
  });
  var html='<div class="main-header"><h1 class="page-title">Calendarios guardados</h1></div>';
  if(!keys.length){
    html+='<div class="cfg-section"><p style="font-size:13px;color:var(--text-muted)">No hay calendarios guardados. Armá uno y apretá Guardar.</p></div>';
  }else{
    html+='<div style="display:flex;flex-direction:column;gap:10px">';
    keys.forEach(function(k){
      var parts=k.split('-').map(Number), y=parts[0], m=parts[1];
      var cal=cals[k];
      var cellCount=Object.keys(cal.cells||{}).length;
      var isCurrent=S.month===m&&S.year===y;
      html+='<div style="background:var(--surface);border:1px solid '+(isCurrent?'var(--text)':'var(--border-light)')+';border-radius:var(--radius-lg);overflow:hidden">'
        +'<div style="padding:14px 18px;display:flex;align-items:center;gap:12px">'
        +'<div style="flex:1">'
        +'<div style="font-family:var(--serif);font-size:18px;font-weight:600">'+MONTHS[m]+' '+y+'</div>'
        +'<div style="font-size:11px;color:var(--text-faint);margin-top:2px">'+cellCount+' activaciones · '+cal.savedAt+'</div>'
        +(isCurrent?'<div style="font-size:10px;color:#1a6740;margin-top:4px;font-weight:500">● Abierto ahora</div>':'')
        +'</div>'
        +'<button class="btn btn-sm" onclick="toggleSavedPreview(\'prev-'+k+'\',\'arr-'+k+'\')" style="flex-shrink:0">Ver ▼</button>'
        +'<button class="btn btn-dark btn-sm" onclick="openSavedCal('+m+','+y+')" style="flex-shrink:0">Editar →</button>'
        +'</div>'
        +'<div id="prev-'+k+'" style="display:none;border-top:1px solid var(--border-light);padding:12px 16px;overflow-x:auto">'
        +buildMiniCalendar(m,y,cal)
        +'</div>'
        +'</div>';
    });
    html+='</div>';
  }
  return html;
}

function toggleSavedPreview(previewId, arrowId){
  var el=document.getElementById(previewId);
  if(!el)return;
  var open=el.style.display==='none';
  el.style.display=open?'block':'none';
  // Update button text
  var btn=el.previousElementSibling&&el.previousElementSibling.querySelector('button');
}

function buildMiniCalendar(month,year,cal){
  var days=cal.customDays||new Date(year,month+1,0).getDate();
  var cells=cal.cells||{};
  var prods=cal.activeProducts?GLOBAL.products.filter(function(p){return cal.activeProducts.indexOf(p.id)>=0;}):GLOBAL.products;
  if(!prods.length)return '<p style="font-size:12px;color:var(--text-muted)">Sin productos.</p>';
  var th='<th style="padding:5px 8px;background:var(--surface2);border:0.5px solid var(--border-light);font-size:10px;color:var(--text-muted);text-align:left">Día</th>';
  prods.forEach(function(p){ th+='<th style="padding:5px 8px;background:var(--surface2);border:0.5px solid var(--border-light);font-size:10px;color:var(--text-muted);white-space:nowrap">'+p.name+'</th>'; });
  var rows='';
  for(var d=1;d<=days;d++){
    var dow=new Date(year,month,d).getDay();
    var isWe=dow===0||dow===6;
    var row='<tr style="background:'+(isWe?'#faf8f4':'var(--surface')+');">'
      +'<td style="padding:3px 8px;border:0.5px solid var(--border-light);white-space:nowrap;color:var(--text-muted)">'
      +'<strong style="color:var(--text)">'+d+'</strong> '+DAYS[dow]+'</td>';
    prods.forEach(function(p){
      var ck=year+'-'+month+'-'+d+'-'+p.id;
      var cid=cells[ck];
      var camp=GLOBAL.campaigns.find(function(c){return c.id===cid;});
      row+='<td style="padding:3px 6px;border:0.5px solid var(--border-light);min-width:80px">';
      if(camp){
        row+='<span style="display:block;border-radius:3px;padding:2px 6px;font-size:10px;font-weight:500;text-align:center;background:rgba('+rgbParts(camp.color)+',.15);color:'+camp.color+';border:1px solid rgba('+rgbParts(camp.color)+',.3)">'+camp.name+'</span>';
      }
      row+='</td>';
    });
    row+='</tr>';
    rows+=row;
  }
  return '<table style="border-collapse:collapse;font-size:11px;width:100%;min-width:400px"><thead><tr>'+th+'</tr></thead><tbody>'+rows+'</tbody></table>';
}

function openSavedCal(month,year){
  loadMonthIntoS(month,year);
  renderSidebar(); showView('calendar');
}

// BUDGET
function buildBudget(){
  var days=getDays(),stats=calcStats(),det=calcBudgetDetail();
  var byType=det.byType,byProd=det.byProd,byWeek=det.byWeek,dailyBudget=det.dailyBudget;
  var html='<div class="main-header"><h1 class="page-title">Presupuesto — '+MONTHS[S.month]+' '+S.year+'</h1>'
    +'<div class="header-actions"><button class="btn btn-green" onclick="exportExcel()">↓ Excel</button>'
    +'<button class="btn" onclick="showView(\'calendar\')">← Calendario</button></div></div>';
  html+='<div class="stats-row">'
    +'<div class="stat-card"><div class="stat-card-label">Total mensual</div><div class="stat-card-val">'+S.currency+' '+stats.total.toLocaleString()+'</div><div class="stat-card-sub">'+stats.acts+' activaciones</div></div>'
    +'<div class="stat-card"><div class="stat-card-label">Promedio diario</div><div class="stat-card-val">'+S.currency+' '+Math.round(stats.total/days)+'</div><div class="stat-card-sub">sobre '+days+' días</div></div>'
    +'<div class="stat-card"><div class="stat-card-label">Días con actividad</div><div class="stat-card-val">'+stats.activeDays+'</div><div class="stat-card-sub">de '+days+' días</div></div>'
    +'<div class="stat-card"><div class="stat-card-label">Tipos activos</div><div class="stat-card-val">'+Object.keys(byType).length+'</div><div class="stat-card-sub">de '+GLOBAL.campaigns.length+'</div></div>'
    +'</div>';
  var maxB=Math.max.apply(null,Object.values(dailyBudget).concat([1]));
  html+='<div class="bcard" style="margin-bottom:16px"><div class="bcard-header">Inversión diaria</div><div class="heatmap">';
  for(var d=1;d<=days;d++){
    var b=dailyBudget[d]||0, alpha=b>0?Math.max(.12,b/maxB):0;
    var bg=b>0?rgba('#2a2420',alpha):'#f0ede6', col=alpha>.5?'#f5f3ee':(b>0?'#1a1714':'#b0a99e');
    html+='<div class="hm-cell" style="background:'+bg+';color:'+col+'">'+d+'<span class="hm-tooltip">Día '+d+': '+S.currency+' '+b+'</span></div>';
  }
  html+='</div></div><div class="budget-grid">';
  html+='<div class="bcard"><div class="bcard-header">Por tipo</div><table class="btable"><tr><th>Tipo</th><th>Días</th><th>'+S.currency+'</th><th>%</th></tr>';
  Object.entries(byType).sort(function(a,b){return b[1].budget-a[1].budget;}).forEach(function(e){
    var name=e[0],v=e[1];
    var camp=GLOBAL.campaigns.find(function(c){return c.name===name;});
    html+='<tr><td><span style="display:inline-flex;align-items:center;gap:5px"><span style="width:8px;height:8px;border-radius:50%;background:'+(camp?camp.color:'#888')+';flex-shrink:0"></span>'+name+'</span></td><td>'+v.days+'</td><td>'+v.budget.toLocaleString()+'</td><td>'+(stats.total>0?Math.round(v.budget/stats.total*100):0)+'%</td></tr>';
  });
  html+='<tr class="total"><td>Total</td><td>'+stats.acts+'</td><td>'+stats.total.toLocaleString()+'</td><td>100%</td></tr></table></div>';
  html+='<div class="bcard"><div class="bcard-header">Por semana</div><table class="btable"><tr><th>Semana</th><th>Acts.</th><th>'+S.currency+'</th><th>%</th></tr>';
  Object.entries(byWeek).filter(function(e){return e[1].budget>0;}).forEach(function(e){
    html+='<tr><td>'+e[0]+'</td><td>'+e[1].acts+'</td><td>'+e[1].budget.toLocaleString()+'</td><td>'+(stats.total>0?Math.round(e[1].budget/stats.total*100):0)+'%</td></tr>';
  });
  html+='<tr class="total"><td>Total</td><td>'+stats.acts+'</td><td>'+stats.total.toLocaleString()+'</td><td>100%</td></tr></table></div></div>';
  html+='<div class="bcard"><div class="bcard-header">Por producto</div><table class="btable"><tr><th>Producto</th><th>Área</th><th>Activaciones</th><th>'+S.currency+'</th><th>%</th></tr>';
  Object.entries(byProd).sort(function(a,b){return b[1].budget-a[1].budget;}).forEach(function(e){
    html+='<tr><td>'+e[0]+'</td><td style="color:var(--text-muted)">'+e[1].area+'</td><td>'+e[1].acts+'</td><td>'+e[1].budget.toLocaleString()+'</td><td>'+(stats.total>0?Math.round(e[1].budget/stats.total*100):0)+'%</td></tr>';
  });
  html+='<tr class="total"><td>Total</td><td></td><td>'+stats.acts+'</td><td>'+stats.total.toLocaleString()+'</td><td>100%</td></tr></table></div>';
  return html;
}

    +'<div class="header-actions"><button class="btn btn-dark save-btn" onclick="doSave()">Guardar</button></div></div>';

    +GLOBAL.products.map(function(p,i){return '<div class="cfg-row"><span class="cfg-row-name">'+p.name+'</span><span class="cfg-row-area">'+p.area+'</span><button class="btn btn-danger btn-sm btn-icon" onclick="removeProduct('+i+');renderView()">×</button></div>';}).join('')
    +'<div class="inline-form" style="margin-top:12px">'
    +'<input type="text" id="cfg-new-prod" placeholder="Nuevo producto...">'
    +'<select id="cfg-new-area" style="width:130px"><option>AGRO</option><option>Ingenieria</option><option>Institucional</option></select>'
    +'<button class="btn btn-sm" onclick="cfgAddProduct()">+ Agregar</button></div></div>';
  html+='<div class="cfg-section"><div class="cfg-title">Tipos de campaña</div>'
    +GLOBAL.campaigns.map(function(c,i){return '<div class="cfg-row"><span style="width:10px;height:10px;border-radius:50%;background:'+c.color+';display:inline-block;flex-shrink:0"></span><span class="cfg-row-name">'+c.name+'</span><span style="font-size:11px;color:var(--text-muted)">'+S.currency+'</span><input type="number" value="'+c.budget+'" min="0" style="width:70px" onchange="GLOBAL.campaigns['+i+'].budget=parseFloat(this.value)||0;renderSidebar()"><span style="font-size:10px;color:var(--text-faint)">/día</span><button class="btn btn-danger btn-sm btn-icon" onclick="removeCampaign('+i+');renderView()">×</button></div>';}).join('')
    +'<div class="inline-form" style="margin-top:12px">'
    +'<input type="text" id="cfg-new-camp" placeholder="Tipo de campaña...">'
    +'<input type="color" id="cfg-new-color" value="#5a3db8">'
    +'<input type="number" id="cfg-new-budget" placeholder="USD/día" min="0" style="width:80px">'
    +'<button class="btn btn-sm" onclick="cfgAddCampaign()">+ Agregar</button></div></div>';
  return html;
}
function cfgAddProduct(){
  var n=document.getElementById('cfg-new-prod').value.trim(),a=document.getElementById('cfg-new-area').value;
  if(!n)return; GLOBAL.products.push({id:'p'+Date.now(),name:n,area:a}); renderView(); renderSidebar();
}
function removeProduct(i){ GLOBAL.products.splice(i,1); renderSidebar(); }
function cfgAddCampaign(){
  var n=document.getElementById('cfg-new-camp').value.trim(),col=document.getElementById('cfg-new-color').value,b=parseFloat(document.getElementById('cfg-new-budget').value)||0;
  if(!n)return; GLOBAL.campaigns.push({id:'c'+Date.now(),name:n,color:col,budget:b}); renderView(); renderSidebar();
}
function removeCampaign(i){ GLOBAL.campaigns.splice(i,1); renderSidebar(); }

// STATS
function calcStats(){
  var days=getDays(),total=0,acts=0,campDays={},ads=new Set();
  for(var d=1;d<=days;d++) activeProdList().forEach(function(p){var cid=S.cells[cellKey(d,p.id)];if(cid){var camp=GLOBAL.campaigns.find(function(c){return c.id===cid;});if(camp){total+=camp.budget;acts++;ads.add(d);campDays[camp.name]=(campDays[camp.name]||0)+1;}}});
  var entries=Object.entries(campDays).sort(function(a,b){return b[1]-a[1];});
  var top=entries[0];
  return{total:total,acts:acts,activeDays:ads.size,topCamp:top?top[0]:null,topCampDays:top?top[1]:0};
}
function calcBudgetDetail(){
  var days=getDays(),byType={},byProd={},byWeek={},dailyBudget={},week=1;
  for(var d=1;d<=days;d++){
    var dow=new Date(S.year,S.month,d).getDay();if(d>1&&dow===1)week++;
    var wk='Semana '+week;if(!byWeek[wk])byWeek[wk]={budget:0,acts:0};
    activeProdList().forEach(function(p){var cid=S.cells[cellKey(d,p.id)];if(cid){var camp=GLOBAL.campaigns.find(function(c){return c.id===cid;});if(camp){var b=camp.budget;dailyBudget[d]=(dailyBudget[d]||0)+b;byType[camp.name]=byType[camp.name]||{color:camp.color,days:0,budget:0};byType[camp.name].days++;byType[camp.name].budget+=b;byProd[p.name]=byProd[p.name]||{area:p.area,acts:0,budget:0};byProd[p.name].acts++;byProd[p.name].budget+=b;byWeek[wk].budget+=b;byWeek[wk].acts++;}}});
  }
  return{byType:byType,byProd:byProd,byWeek:byWeek,dailyBudget:dailyBudget};
}

// EXCEL
function exportExcel(){
  if(!window.XLSX){var s=document.createElement('script');s.src='https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js';s.onload=function(){doExcel();};document.head.appendChild(s);}
  else doExcel();
}
function doExcel(){
  var days=getDays(),det=calcBudgetDetail(),stats=calcStats(),prods=activeProdList();
  var byType=det.byType,byProd=det.byProd,byWeek=det.byWeek;
  var wb=XLSX.utils.book_new();
  var calH=['Semana','Día','Fecha'].concat(prods.map(function(p){return p.name;}));
  var calR=[calH],week=1;
  for(var d=1;d<=days;d++){var dow=new Date(S.year,S.month,d).getDay();if(d>1&&dow===1)week++;var row=[(d===1||dow===1)?'Semana '+week:'',DAYS[dow],String(d).padStart(2,'0')+'/'+String(S.month+1).padStart(2,'0')+'/'+S.year];prods.forEach(function(p){var cid=S.cells[cellKey(d,p.id)];var camp=GLOBAL.campaigns.find(function(c){return c.id===cid;});row.push(camp?camp.name:'');});calR.push(row);}
  var wsC=XLSX.utils.aoa_to_sheet(calR);wsC['!cols']=[{wch:10},{wch:8},{wch:10}].concat(prods.map(function(){return {wch:14};}));XLSX.utils.book_append_sheet(wb,wsC,'Calendario');
  var budR=[[],[],['Total mensual',S.currency+' '+stats.total],['Promedio diario',S.currency+' '+Math.round(stats.total/days)],['Días con actividad',stats.activeDays],['Activaciones',stats.acts],[],['Por tipo'],['Tipo','Días',S.currency,'%']].concat(Object.entries(byType).sort(function(a,b){return b[1].budget-a[1].budget;}).map(function(e){return [e[0],e[1].days,e[1].budget,(stats.total>0?Math.round(e[1].budget/stats.total*100):0)+'%'];})).concat([['TOTAL',stats.acts,stats.total,'100%'],[],['Por semana'],['Semana','Acts',S.currency,'%']]).concat(Object.entries(byWeek).filter(function(e){return e[1].budget>0;}).map(function(e){return [e[0],e[1].acts,e[1].budget,(stats.total>0?Math.round(e[1].budget/stats.total*100):0)+'%'];})).concat([['TOTAL',stats.acts,stats.total,'100%'],[],['Por producto'],['Producto','Área','Acts',S.currency,'%']]).concat(Object.entries(byProd).sort(function(a,b){return b[1].budget-a[1].budget;}).map(function(e){return [e[0],e[1].area,e[1].acts,e[1].budget,(stats.total>0?Math.round(e[1].budget/stats.total*100):0)+'%'];})).concat([['TOTAL','',stats.acts,stats.total,'100%']]);
  var wsB=XLSX.utils.aoa_to_sheet(budR);wsB['!cols']=[{wch:22},{wch:12},{wch:12},{wch:8}];XLSX.utils.book_append_sheet(wb,wsB,'Presupuesto');
  XLSX.writeFile(wb,'Calendario_'+MONTHS[S.month]+'_'+S.year+'.xlsx');
}

// INIT
renderSidebar();
renderView();
syncLoad();
</script>
</body>
</html>
