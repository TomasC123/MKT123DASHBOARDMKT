function renderVentas(){
  var el=document.getElementById('ventas-content');if(!el)return;
  var vs=G.ventas;

  if(!vs.length){
    el.innerHTML='<div class="empty"><p>No hay ventas registradas.</p><button class="btn btn-ink" onclick="newVenta()" style="margin-top:12px">+ Nueva venta</button></div>';
    return;
  }

  // KPIs
  var totMonto=0,totNuevo=0,totRec=0;
  var byProd={},byCamp={};
  vs.forEach(function(v){
    if(v.monto)totMonto+=v.monto;
    if(v.tipoVenta==='Nuevo')totNuevo++;
    if(v.tipoVenta==='Recurrente')totRec++;
    var pn=pName(v.producto)||'—';
    if(!byProd[pn])byProd[pn]={count:0,monto:0};
    byProd[pn].count++;if(v.monto)byProd[pn].monto+=v.monto;
    if(v.campanaId){
      if(!byCamp[v.campanaId])byCamp[v.campanaId]={count:0,monto:0};
      byCamp[v.campanaId].count++;if(v.monto)byCamp[v.campanaId].monto+=v.monto;
    }
  });

  // ROI: total facturado vs total invertido en campañas vinculadas
  var totalInvCamps=0;
  Object.keys(byCamp).forEach(function(cid){
    var c=G.campaigns.find(function(x){return x.id===cid;});
    if(c&&c.effTotal)totalInvCamps+=c.effTotal;
  });
  var roi=totalInvCamps?Math.round((totMonto-totalInvCamps)/totalInvCamps*100):null;

  var html='<div class="kpi-grid">'
    +'<div class="kpi green"><div class="kl">Total facturado</div><div class="kv">$'+totMonto.toLocaleString()+'</div><div class="ks">'+vs.length+' ventas</div></div>'
    +'<div class="kpi blue"><div class="kl">Inversión vinculada</div><div class="kv">'+(totalInvCamps?'$'+totalInvCamps.toLocaleString():'—')+'</div><div class="ks">campañas de origen</div></div>'
    +'<div class="kpi '+(roi!==null?roi>=0?'green':'red':'neutral')+'"><div class="kl">ROI</div><div class="kv">'+(roi!==null?(roi>0?'+':'')+roi+'%':'—')+'</div><div class="ks">'+(roi!==null?roi>=0?'rentable':'negativo':'sin datos')+'</div></div>'
    +'<div class="kpi gold"><div class="kl">Nuevos clientes</div><div class="kv">'+totNuevo+'</div></div>'
    +'<div class="kpi neutral"><div class="kl">Recurrentes</div><div class="kv">'+totRec+'</div></div>'
    +'<div class="kpi neutral"><div class="kl">Ticket promedio</div><div class="kv">'+(vs.length?'$'+Math.round(totMonto/vs.length).toLocaleString():'—')+'</div></div>'
    +'</div>';

  // By product
  if(Object.keys(byProd).length>1){
    var maxP=Math.max.apply(null,Object.values(byProd).map(function(v){return v.monto;}));
    html+='<div class="cg"><div class="cc"><div class="cct">Facturación por producto</div>'
      +Object.entries(byProd).sort(function(a,b){return b[1].monto-a[1].monto;}).map(function(e){
        var pct=maxP>0?Math.round(e[1].monto/maxP*100):0;
        return '<div class="br"><div class="bl">'+e[0]+'</div><div class="bt"><div class="bf" style="width:'+pct+'%;background:var(--green)"></div></div><div class="bv">$'+e[1].monto.toLocaleString()+'<br><span style="font-size:9px;color:var(--faint)">'+e[1].count+' ventas</span></div></div>';
      }).join('')+'</div>';

    // Top campaigns by revenue
    var campRev=Object.entries(byCamp).map(function(e){
      var c=G.campaigns.find(function(x){return x.id===e[0];});
      var inv=c&&c.effTotal?c.effTotal:0;
      var roiC=inv?Math.round((e[1].monto-inv)/inv*100):null;
      return {cod:c?c.codigo:e[0],monto:e[1].monto,count:e[1].count,inv:inv,roi:roiC};
    }).sort(function(a,b){return b.monto-a.monto;});

    html+='<div class="cc"><div class="cct">Facturación por campaña</div>'
      +campRev.slice(0,6).map(function(r){

// ── VENTAS EXPORTS ───────────────────────────────────
function exportVentasExcel(){
  if(!G.ventas.length){alert('No hay ventas para exportar.');return;}

  var rows=[['Fecha','Cliente','Producto','Área','Tipo de venta','Facturación ($)',
    'Campaña origen','Tipo campaña','Presupuesto campaña','Invertido campaña',
    'ROI (%)','Notas']];

  G.ventas.forEach(function(v){
    var camp=v.campanaId?G.campaigns.find(function(c){return c.id===v.campanaId;}):null;
    var inv=camp&&camp.effTotal?camp.effTotal:null;
    var roi=inv&&v.monto?Math.round((v.monto-inv)/inv*100):null;
    rows.push([
      v.fecha,
      v.cliente,
      pName(v.producto)||'—',
      pArea(v.producto)||'—',
      v.tipoVenta||'—',
      v.monto||0,
      camp?camp.codigo:'—',
      camp?camp.tipo:'—',
      camp?camp.budTotal||'':'—',
      inv||'—',
      roi!==null?roi+'%':'—',
      v.notas||''
    ]);
  });

  // Summary by product
  var byProd={};
  G.ventas.forEach(function(v){
    var pn=pName(v.producto)||'—';
    var a=pArea(v.producto)||'—';
    if(!byProd[pn])byProd[pn]={area:a,count:0,monto:0,inv:0};
    byProd[pn].count++;
    if(v.monto)byProd[pn].monto+=v.monto;
    if(v.campanaId){var c=G.campaigns.find(function(x){return x.id===v.campanaId;});if(c&&c.effTotal)byProd[pn].inv+=c.effTotal;}
  });

  var sumRows=[['Producto','Área','Ventas','Facturación total','Inversión vinculada','ROI (%)']];
  Object.entries(byProd).forEach(function(e){
    var v=e[1];
    var roi=v.inv&&v.monto?Math.round((v.monto-v.inv)/v.inv*100):null;
    sumRows.push([e[0],v.area,v.count,v.monto,v.inv||'—',roi!==null?roi+'%':'—']);
  });

  var wb=XLSX.utils.book_new();
  var ws1=XLSX.utils.aoa_to_sheet(rows);
  var ws2=XLSX.utils.aoa_to_sheet(sumRows);
  ws1['!cols']=[{wch:12},{wch:20},{wch:16},{wch:12},{wch:14},{wch:14},{wch:30},{wch:10},{wch:14},{wch:14},{wch:10},{wch:30}];
  ws2['!cols']=[{wch:16},{wch:12},{wch:8},{wch:16},{wch:18},{wch:10}];
  XLSX.utils.book_append_sheet(wb,ws1,'Ventas');
  XLSX.utils.book_append_sheet(wb,ws2,'Por producto');
  XLSX.writeFile(wb,'Ventas_'+new Date().toISOString().slice(0,10)+'.xlsx');
}

// ── AUTH ─────────────────────────────────────────────
var HASH_MKT='6adc93777146b2d318afe6f9de20e4ad6954ddfa5d9de9afb6885d39b81b6c5c';
var HASH_VIS='5a80fe2366cf398f675d78e892649bab31f07d7486eb51562a103fe509e4db95';
var userRole=null; // 'mkt' or 'visitor'

function sha256(str){
  // Simple async-free hash using SubtleCrypto — but we need sync
  // Use precomputed approach: compare after async hash
  return crypto.subtle.digest('SHA-256', new TextEncoder().encode(str))
    .then(function(buf){
      return Array.from(new Uint8Array(buf)).map(function(b){return b.toString(16).padStart(2,'0');}).join('');
    });
}

function doLogin(){
  var pwd=document.getElementById('login-pwd').value;
  sha256(pwd).then(function(hash){
    if(hash===HASH_MKT){
      userRole='mkt';
      startApp();
    }else if(hash===HASH_VIS){
      userRole='visitor';
      startApp();
    }else{
      document.getElementById('login-err').textContent='Contraseña incorrecta';
      document.getElementById('login-pwd').value='';
    }
  });
}

function startApp(){
  document.getElementById('login-screen').style.display='none';
  document.getElementById('app-shell').style.display='flex';
  if(userRole==='visitor'){
    document.getElementById('ro-badge').style.display='block';
    // Hide edit buttons for visitors
    disableForVisitor();
  }
  renderAll();
  renderForm();
  syncLoad();
}

function disableForVisitor(){
  // Override functions that modify data
  submitForm=function(){alert('Modo solo lectura. Contactá al equipo de MKT.');};
  deleteFromForm=function(){alert('Modo solo lectura.');};
  syncSave=function(){return Promise.resolve();}; // no-op save
  doSave=function(){alert('Modo solo lectura.');};
  submitMailing=function(){alert('Modo solo lectura.');};
  deleteMailing=function(){alert('Modo solo lectura.');};
  submitVenta=function(){alert('Modo solo lectura.');};
  deleteVenta=function(){alert('Modo solo lectura.');};
  doJSONImport=function(){alert('Modo solo lectura.');};
  // Hide new/edit buttons via CSS
  var style=document.createElement('style');
  style.textContent='.btn-ink,.btn-danger,.save-btn{opacity:.35!important;pointer-events:none!important}';
  document.head.appendChild(style);
}

// ── INIT ─────────────────────────────────────────────
// Don't auto-start — wait for login
// But check sessionStorage for already-logged-in session
(function(){
  var saved=sessionStorage.getItem('campanas_role');
  if(saved==='mkt'||saved==='visitor'){
    userRole=saved;
    startApp();
  }
})();

// Save role to session on login
var _startApp=startApp;
startApp=function(){
  sessionStorage.setItem('campanas_role',userRole);
  _startApp();
};
